<div class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
  <div *ngFor="let toast of toasts$ | async; trackBy: trackById"
       class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium max-w-sm w-full pointer-events-auto
              animate-[slideIn_0.2s_ease-out]"
       [ngClass]="{
         'bg-green-600 text-white': toast.type === 'success',
         'bg-red-600 text-white':   toast.type === 'error',
         'bg-blue-600 text-white':  toast.type === 'info'
       }">

    <!-- Ícono -->
    <span class="shrink-0 mt-0.5">
      <svg *ngIf="toast.type === 'success'" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
      <svg *ngIf="toast.type === 'error'" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
      <svg *ngIf="toast.type === 'info'" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </span>

    <!-- Mensaje -->
    <span class="flex-1 leading-snug">{{ toast.message }}</span>

    <!-- Cerrar -->
    <button (click)="dismiss(toast.id)" class="shrink-0 opacity-70 hover:opacity-100 transition-opacity -mt-0.5">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
